system {
    host-name r2;
    root-authentication {
        encrypted-password "$6$6f2kHzLr$Fnq.P/WTZQwxuINAitTzaSrGlmimznxgM1L3bHDOE/T85FcFdu3qlTCzve1Ru2BrSYeYBOQyA0PVCB6WlteKE/"; ## SECRET-DATA
    }
    login {
        user admin {
            uid 2001;
            class super-user;
            authentication {
                encrypted-password "$6$NWINpIG3$9imW330oxmhdnYXh5AQ51E.kSa5afMNVYjRY8m1c4bMe2.toZBFwXLaj/B/0XxkzguADkHWvi3dpl4qjR.cbb."; ## SECRET-DATA
            }
        }
    }
    services {
        ssh {
            sftp-server;
        }
    }
    syslog {
        file interactive-commands {
            interactive-commands any;
        }
        file messages {
            any notice;
            authorization info;
        }
    }
