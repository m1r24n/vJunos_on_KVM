      ge-0/0/0: link1
      ge-0/0/1: link2
      ge-0/0/2: link3
      ge-0/0/3: link4
  sw2:
    type: vex
    ip_address: 10.1.101.102
    port:
      ge-0/0/0: link5
      ge-0/0/1: link6
      ge-0/0/2: link3
      ge-0/0/3: link4
  svr1a:
    type: ubuntu
    port:
      eth0: link1
      eth1: link2
  svr2a:
    type: ubuntu
    port:
      eth0: link5
      eth1: link6

