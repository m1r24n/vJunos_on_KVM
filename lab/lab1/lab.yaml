---
disk: 
  vjunosrouter: /disk3/vjunos/vJunos-router-25.4R1.12.qcow2
  vjunosswitch: /disk3/vjunos/vJunos-switch-25.4R1.12.qcow2
  # vjunosevolved: /disk3/vjunos/vJunosEvolved-25.2R1.8-EVO.qcow2
  # vjunosevolved_config: /disk3/vjunos/vjunosevolved_config.img
vm_dir: /disk2/vm/lab1
mgmt:
  bridge: br0
ovs:
- pe1_ge0
- pe2_ge0
junos_login:
  user: admin
  password: pass01
  ssh_key_name: id_rsa
ip_pool:
  subnet: 192.168.250.0/24
  gateway: 192.168.250.254
  option-150: 192.168.250.254
  dns: 192.168.1.1
  range: 
    min: 192.168.250.1
    max: 192.168.250.200
fabric:
  ipv4_prefix: 10.1.100.0/24
  ipv6_prefix: fc00:dead:beef:ffff:ffff::/80
  topology:
  - [pe1,ge-0/0/1,p1,ge-0/0/1,0xf]
  - [pe1,ge-0/0/2,p2,ge-0/0/1,0xf]
  - [pe2,ge-0/0/1,p1,ge-0/0/2,0xf]
  - [pe2,ge-0/0/2,p2,ge-0/0/2,0xf]
  - [p1,ge-0/0/0,p2,ge-0/0/0,0xf]
vm:
  pe1:
    type: vjunosrouter  
    ip_address: 192.168.250.11
    lo0:
      family:
        inet: 10.1.255.1
        inet6: fc00:dead:beef:ffff::1
        iso: 49.0001.0001.0001.00
      protocol:
        isis: yes
    port:
      ge-0/0/0: 
        bridge: pe1_ge0
  pe2:
    type: vjunosrouter  
    ip_address: 192.168.250.12
    lo0:
      family:
        inet: 10.1.255.2
        inet6: fc00:dead:beef:ffff::2
        iso: 49.0001.0001.0002.00
      protocol:
        isis: yes
    port:
      ge-0/0/0: 
        bridge: pe2_ge0
  p1:
    type: vjunosrouter  
    ip_address: 192.168.250.13
    lo0:
      family:
        inet: 10.1.255.11
        inet6: fc00:dead:beef:ffff::11
        iso: 49.0001.0001.0011.00
      protocol:
        isis: yes
    port: {}
  p2:
    type: vjunosrouter  
    ip_address: 192.168.250.14
    lo0:
      family:
        inet: 10.1.255.12
        inet6: fc00:dead:beef:ffff::12
        iso: 49.0001.0001.0012.00
      protocol:
        isis: yes
    port: {}
    
