---
disk: 
  vjunos: /disk2/images/vjunos/vJunos-switch-23.2R1.14.qcow2
  vjunos_router: /disk2/images/vjunos/vjunos-router-23.2R1.14.qcow2
  vjunosevolved: /disk2/images/vjunos/vJunosEvolved-23.2R1.15.qcow2
  vjunosevolved_config: /disk2/images/vjunos/vjunosevolved_config.img
  alpine: /disk2/images/alpine.img
  ubuntu: /disk2/images/ubuntu.img
vm_dir: /data1/vm/topo5
mgmt:
  bridge: sw1
  type: ovs
  vlan: 101
junos_login:
  user: admin
  password: pass01
ip_pool:
  subnet: 10.1.101.0/24
  gateway: 10.1.101.1
  option-150: 10.1.101.2
  range: 
    min: 10.1.101.11
    max: 10.1.101.99
vm:
  r1:
    type: vjunosevolved
    ip_address: 10.1.101.101
    port:
      et-0/0/0: r1g0
      et-0/0/1: wan1
      et-0/0/2: wan2
  r2:
    type: vjunosevolved
    ip_address: 10.1.101.102
    port:
      et-0/0/0: r2g0
      et-0/0/1: wan1
      et-0/0/2: wan2
  svr1a:
    type: alpine
    port:
      eth0: r1g0
  svr4a:
    type: ubuntu
    port:
      eth0: r4g0

