groups {
    l3config_ospf_ipv4 {
        interfaces {
            ge-0/0/0 {
                mtu 9000;
                unit 0 {
                    family inet {
                        address 10.1.255.128/31;
                    }
                }
            }
            ge-0/0/1 {
                mtu 9000;
                unit 0 {
                    family inet {
                        address 10.1.255.130/31;
                    }
                }
            }
            lo0 {
                unit 0 {
                    family inet {
                        address 10.1.255.1/32;
                    }
                }
            }
            ge-0/0/4 {
                unit 0 {
                    family ethernet-switching {
                                        
                        interface-mode trunk;
                        vlan {
                            members all;
                        }
                    }
                }
            }
        }
        policy-options {
            policy-statement LB {
                then {
                    load-balance per-flow;
                }
            }
        }
        routing-instances {
            evpn-1 {
                instance-type mac-vrf;
                protocols {
                    evpn {
                        encapsulation vxlan;
                        default-gateway do-not-advertise;
                        duplicate-mac-detection {
                            auto-recovery-time 9;
                        }
                        extended-vni-list all;
                        vni-options {
                            vni 10011 {
                                vrf-target target:10011:1;
                            }
                            vni 10012 {
                                        
                                vrf-target target:10012:1;
                            }
                            vni 10013 {
                                vrf-target target:10013:1;
                            }
                        }
                    }
                }
                vtep-source-interface lo0.0;
                service-type vlan-aware;
                interface ge-0/0/4.0;
                route-distinguisher 10.1.255.1:1001;
                vrf-target target:1000:1001;
                vlans {
                    vlan11 {
                        description vlan11;
                        vlan-id 11;
                        no-arp-suppression;
                        vxlan {
                            vni 10011;
                        }
                    }
                    vlan12 {
                        description vlan12;
                        vlan-id 12;
                        no-arp-suppression;
                        vxlan {
                            vni 10012;
                        }
                    }
                    vlan13 {            
                        description vlan13;
                        vlan-id 13;
                        no-arp-suppression;
                        vxlan {
                            vni 10013;
                        }
                    }
                }
            }
        }
        routing-options {
            router-id 10.1.255.1;
            autonomous-system 4200000001;
            forwarding-table {
                export LB;
                chained-composite-next-hop {
                    ingress {
                        evpn;
                    }
                }
            }
        }
        protocols {
            bgp {
                group to_other {
                    type internal;
                    local-address 10.1.255.1;
                    family evpn {
                        signaling;
                    }
                    neighbor 10.1.255.2;                             
                }
            }
            ospf {
                area 0.0.0.0 {
                    interface lo0.0 {
                        passive;
                    }
                    interface ge-0/0/0.0 {
                        interface-type p2p;
                    }
                    interface ge-0/0/1.0 {
                        interface-type p2p;
                    }
                }
            }
            lldp {
                interface all;
            }
        }
    }
}
apply-groups l3config_ospf_ipv4;
