system {
    host-name l2;
    root-authentication {
		encrypted-password "$1$1N08MmbC$lKMlDlgzxDirS1bymaVn4."; ## SECRET-DATA
    }
    login {
        user admin {
            class super-user;
            authentication {
				encrypted-password "$1$1N08MmbC$lKMlDlgzxDirS1bymaVn4."; ## SECRET-DATA
            }
        }
    }
    services {
        ssh {
            root-login allow;
        }
        netconf {
            ssh;
        }
    }
    arp {
        aging-timer 5;
    }
    management-instance;
    syslog {
        file interactive-commands {
            interactive-commands any;
        }
        file messages {
            any notice;
            authorization info;
        }
    }
}
chassis {
    evpn-vxlan-default-switch-support;
}
interfaces {
fxp0 {
        unit 0 {
            family inet {
                address 10.1.101.112/24;
            }
        }
    }
}
routing-instances {
    mgmt_junos {
        routing-options {
            static {
                route 0.0.0.0/0 next-hop 10.1.101.1;
            }
        }
    }
}